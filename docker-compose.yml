services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.1
    ports:
      - "${LISTEN_PORT:-3000}:4180"
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OAUTH2_PROXY_CLIENT_ID=${OIDC_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${COOKIE_SECRET}
      - OAUTH2_PROXY_REDIRECT_URL=${PUBLIC_URL}/oauth2/callback
      - OAUTH2_PROXY_UPSTREAMS=http://job-tracker:3000
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      # WARNING: OAUTH2_PROXY_EMAIL_DOMAINS=* is ONLY safe with a private OIDC provider
      # (e.g. self-hosted PocketID). Do NOT change OIDC_ISSUER_URL to a public provider
      # (Google, GitHub, etc.) without also restricting this to a specific domain —
      # doing so would allow anyone with an account on that provider to sign in.
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_SCOPE=openid profile email
      - OAUTH2_PROXY_COOKIE_SECURE=${COOKIE_SECURE:-true}
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
    depends_on:
      job-tracker:
        condition: service_healthy

  job-tracker:
    build: .
    expose:
      - "3000"
    ports:
      - "127.0.0.1:445:3445"     # SMB - high port internally, 445 externally, localhost only
    environment:
      - NODE_ENV=production
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - RATE_LIMIT_API=${RATE_LIMIT_API:-100}
      - RATE_LIMIT_UPLOADS=${RATE_LIMIT_UPLOADS:-20}
      - ENABLE_SMB=${ENABLE_SMB:-false}
      - SMB_USER=${SMB_USER:-}
      - SMB_PASS=${SMB_PASS:-}
      - SMB_USER_EMAIL=${SMB_USER_EMAIL:-}
      - SMB_CREDENTIALS_FILE=${SMB_CREDENTIALS_FILE:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./smb-share:/app/smb-share
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # If using SMB, set on the host: sysctl fs.inotify.max_user_watches=524288
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
